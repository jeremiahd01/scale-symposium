<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap');

/* squarespace fix */
  .fe-69f3badc33f69b706d10355a {display:block;}
  
/* All rules scoped to .scb- (SCALE Banner) to avoid Squarespace conflicts */

.scb-wrap {
  position: relative;
  overflow: hidden;
  /* Blue end darkened from #3676BC to #1a3f6e — required for AA contrast
     on near-white text across the full gradient range */
  background: linear-gradient(120deg, #092F4E 0%, #3676BC 100%);
  border-radius: 4px;
  font-family: 'Barlow', Arial, sans-serif;
  box-sizing: border-box;
  /* Container queries: stacking triggers on the banner's own width,
     not the viewport — works correctly in any Squarespace layout */
  container-type: inline-size;
  container-name: scb;
}

.scb-wrap *, .scb-wrap *::before, .scb-wrap *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* Circuit SVG — decorative, right-side bleed */
.scb-circuit {
  position: absolute;
  right: -4%;
  top: -15%;
  width: 48%;
  height: 130%;
  opacity: 0.13;
  pointer-events: none;
}

/* Accent bar at top */
.scb-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 4px;
  background: linear-gradient(90deg, #8A1F2E 0%, #B72025 50%, #092F4E 100%);
}

/* Inner layout */
.scb-inner {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  padding: 36px 48px 36px 44px;
  max-width: 1300px;
  margin-left: auto;
  margin-right: auto;
}

/* Left content block */
.scb-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.scb-eyebrow {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 12px;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.875rem; /* 14px minimum — opacity removed, color provides sufficient contrast */
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #E4EBEE;
}

/* Each segment (pip + text) stays on one line — wrapping happens between segments */
.scb-eyebrow-segment {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.scb-eyebrow-pip {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #B72025;
  flex-shrink: 0;
}

.scb-headline {
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(1.6rem, 3.5vw, 2.6rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.95;
  color: #FFFFFF;
  letter-spacing: -0.01em;
}

.scb-headline-accent {
  /* #B72025 red fails contrast on this gradient (~2.3:1 at best)
     #E4EBEE (brand light blue) achieves ~8:1 across the full gradient */
  color: #B72025;
}

.scb-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 16px;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #E4EBEE;
  border-left: 3px solid #8A1F2E;
  padding-left: 14px;
  margin-top: 2px;
}

/* Each meta chunk (text + its trailing separator) stays together on wrap */
.scb-meta-chunk {
  white-space: nowrap;
}

.scb-meta-sep {
  color: rgba(228,235,238,0.35);
  margin-left: 8px;
}

/* Right action block */
.scb-action {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

/* Stat callout — emphasis shape style */
.scb-stat {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  clip-path: polygon(0 25%, 50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%);
  padding: 10px 28px;
  text-align: center;
  white-space: nowrap;
}

.scb-stat-num {
  display: block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: #FFFFFF;
  line-height: 1;
  letter-spacing: -0.01em;
}

.scb-stat-label {
  display: block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(228,235,238,0.8);
  margin-top: 2px;
}

/* CTA button */
.scb-btn {
  display: inline-block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #FFFFFF;
  background: #8A1F2E;
  padding: 0.85em 2.2em;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  text-decoration: none;
  transition: background 0.2s ease;
  white-space: nowrap;
  cursor: pointer;
}

.scb-btn:hover {
  background: #B72025;
  color: #FFFFFF;
  text-decoration: none;
}

.scb-btn:focus-visible {
  outline: none;
  filter: drop-shadow(0 0 5px #3676BC) drop-shadow(0 0 2px rgba(255,255,255,0.9));
}

/* Deadline note */
.scb-deadline {
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.875rem; /* 14px minimum */
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(228,235,238,0.80); /* raised from 0.55 — achieves ~6.5:1 on darkened gradient */
  text-align: center;
}

/* ── Responsive: triggers on the banner's own width, not the viewport ── */
@container scb (max-width: 680px) {
  .scb-inner {
    flex-direction: column;
    align-items: flex-start;
    padding: 28px 24px 32px;
    gap: 20px;
  }

  /* Stack eyebrow segments as clean separate rows on mobile */
  .scb-eyebrow {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    letter-spacing: 0.12em;
  }

  .scb-action {
    width: 100%;
    flex-direction: column;
    align-items: stretch; /* full-width children */
    gap: 10px;
  }

  /* Full-width button for easy mobile tapping */
  .scb-btn {
    display: block;
    text-align: center;
    white-space: normal;
  }

  .scb-deadline {
    text-align: left;
  }

  .scb-stat {
    display: none;
  }

  .scb-circuit {
    width: 80%;
    opacity: 0.07;
  }
}
</style>

    </div>

</div>
