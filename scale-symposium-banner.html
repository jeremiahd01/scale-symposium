<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap');

/* All rules scoped to .scb- (SCALE Banner) to avoid Squarespace conflicts */

.scb-wrap {
  position: relative;
  overflow: hidden;
  background: linear-gradient(120deg, #092F4E 0%, #3676BC 100%  );
  border-radius: 4px;
  font-family: 'Barlow', Arial, sans-serif;
  box-sizing: border-box;
}

.scb-wrap *, .scb-wrap *::before, .scb-wrap *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* Circuit SVG — decorative, right-side bleed */
.scb-circuit {
  position: absolute;
  right: -4%;
  top: -15%;
  width: 48%;
  height: 130%;
  opacity: 0.13;
  pointer-events: none;
}

/* Accent bar at top */
.scb-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 4px;
  background: linear-gradient(90deg, #8A1F2E 0%, #B72025 50%, #092F4E 100%);
}

/* Inner layout */
.scb-inner {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  padding: 36px 48px 36px 44px;
}

/* Left content block */
.scb-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.scb-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #E4EBEE;
  opacity: 0.85;
}

.scb-eyebrow-pip {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #B72025;
  flex-shrink: 0;
}

.scb-headline {
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: clamp(1.6rem, 3.5vw, 2.6rem);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.95;
  color: #FFFFFF;
  letter-spacing: -0.01em;
}

.scb-headline-accent {
  color: #B72025;
}

.scb-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 16px;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #E4EBEE;
  border-left: 3px solid #8A1F2E;
  padding-left: 14px;
  margin-top: 2px;
}

.scb-meta-sep {
  color: rgba(228,235,238,0.35);
}

/* Right action block */
.scb-action {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

/* Stat callout — emphasis shape style */
.scb-stat {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  clip-path: polygon(0 25%, 50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%);
  padding: 10px 28px;
  text-align: center;
  white-space: nowrap;
}

.scb-stat-num {
  display: block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: #FFFFFF;
  line-height: 1;
  letter-spacing: -0.01em;
}

.scb-stat-label {
  display: block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(228,235,238,0.8);
  margin-top: 2px;
}

/* CTA button */
.scb-btn {
  display: inline-block;
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #FFFFFF;
  background: #8A1F2E;
  padding: 0.85em 2.2em;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  text-decoration: none;
  transition: background 0.2s ease;
  white-space: nowrap;
  cursor: pointer;
}

.scb-btn:hover {
  background: #B72025;
  color: #FFFFFF;
  text-decoration: none;
}

.scb-btn:focus-visible {
  outline: none;
  filter: drop-shadow(0 0 5px #3676BC) drop-shadow(0 0 2px rgba(255,255,255,0.9));
}

/* Deadline note */
.scb-deadline {
  font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(228,235,238,0.55);
  text-align: center;
  white-space: nowrap;
}

/* ── Responsive ── */
@media (max-width: 680px) {
  .scb-inner {
    flex-direction: column;
    align-items: flex-start;
    padding: 28px 28px 32px;
    gap: 24px;
  }
  .scb-action {
    width: 100%;
    align-items: flex-start;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px 20px;
  }
  .scb-stat {
    display: none; /* de-clutter on small screens */
  }
  .scb-circuit {
    width: 70%;
    opacity: 0.08;
  }
}
</style>
